name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam format --check src test

  test-erlang:
    name: Erlang (OTP ${{ matrix.otp-version }}, Gleam ${{ matrix.gleam-version }})
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        otp-version: ["27", "28", "29"]
        gleam-version: ["1.16", "1.17", "nightly"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp-version }}
          gleam-version: ${{ matrix.gleam-version }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target erlang
      - run: gleam test --target erlang -- --tag wycheproof

  test-javascript:
    name: JavaScript (Node ${{ matrix.node-version }}, Gleam ${{ matrix.gleam-version }})
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24", "26"]
        gleam-version: ["1.16", "1.17", "nightly"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: ${{ matrix.gleam-version }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target javascript
      - run: gleam test --target javascript -- --tag wycheproof
